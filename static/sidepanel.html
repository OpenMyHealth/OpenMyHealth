<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>openChart</title>
    <style>
      :root {
        color-scheme: light;
        font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        margin: 0;
        padding: 12px;
        background: linear-gradient(135deg, #f7f8fa, #eef4ff);
      }

      .layout {
        display: grid;
        gap: 10px;
      }

      .card {
        background: #ffffff;
        border: 1px solid #d8deeb;
        border-radius: 10px;
        padding: 10px;
      }

      h1 {
        margin: 0;
        font-size: 16px;
      }

      label {
        display: block;
        margin-bottom: 4px;
        font-size: 12px;
        font-weight: 600;
        color: #1f2937;
      }

      input,
      textarea,
      select,
      button {
        width: 100%;
        box-sizing: border-box;
        border-radius: 8px;
        border: 1px solid #c8d0df;
        font-size: 12px;
      }

      input,
      textarea,
      select {
        padding: 8px;
        background: #fbfdff;
      }

      textarea {
        resize: vertical;
        min-height: 78px;
      }

      button {
        cursor: pointer;
        padding: 8px;
        font-weight: 600;
        background: #0f766e;
        color: #fff;
        border: 0;
      }

      .sub {
        background: #1d4ed8;
      }

      .muted {
        background: #475569;
      }

      #status {
        font-size: 12px;
        min-height: 16px;
      }

      #status[data-type="error"] {
        color: #b91c1c;
      }
    </style>
  </head>
  <body>
    <div class="layout">
      <div class="card">
        <h1 id="titleText">openChart</h1>
        <p id="descriptionText" style="margin: 4px 0 0; font-size: 12px; color: #334155">
          HIRA JSON 기반으로 AI chatbot 입력 초안을 생성합니다.
        </p>
      </div>

      <div class="card">
        <label id="providerLabel" for="provider">Provider</label>
        <select id="provider">
          <option value="chatgpt">ChatGPT</option>
          <option value="gemini">Gemini</option>
          <option value="claude">Claude</option>
        </select>

        <label id="questionLabel" for="question" style="margin-top: 8px">질문</label>
        <textarea id="question" placeholder="예: 최근 복약 변화와 주의할 점을 정리해줘"></textarea>

        <label id="encodeDataLabel" for="encodeData" style="margin-top: 8px">encodeData (수동 인증 결과)</label>
        <input id="encodeData" placeholder="NICE 인증 후 받은 encodeData" />
        <button class="sub" id="fetchFromEncodeData" style="margin-top: 6px">encodeData로 HIRA 조회</button>

        <label id="hiraPayloadLabel" for="hiraJson" style="margin-top: 8px">HIRA JSON Payload</label>
        <label style="margin-top: 8px; display: flex; align-items: center; gap: 6px">
          <input id="telemetryOptIn" type="checkbox" style="width: 14px; height: 14px" />
          <span id="telemetryLabelText">익명 텔레메트리 수집 동의(기본 비활성)</span>
        </label>
        <textarea id="hiraJson" placeholder='{"treatmentsSummary":[],"treatmentsDetail":[],"prescriptions":[]}'></textarea>

        <div style="display: grid; gap: 6px; margin-top: 8px">
          <button id="buildDraft">초안 만들기</button>
          <button class="sub" id="insertDraft">활성 탭 입력창에 삽입</button>
          <button class="muted" id="copyDraft">클립보드 복사</button>
        </div>
      </div>

      <div class="card">
        <label id="draftLabel" for="draft">초안</label>
        <textarea id="draft" placeholder="생성된 초안이 여기에 표시됩니다."></textarea>
      </div>

      <div id="status" class="card" data-type="info"></div>
    </div>
    <script type="module" src="./sidepanel/index.js"></script>
  </body>
</html>
