name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-gates:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.25.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm type-check

      - name: Security audit (high+)
        run: pnpm audit --audit-level high

      - name: Unit tests
        run: pnpm test

      - name: Relay tests
        run: pnpm test:relay

      - name: Build relay
        run: pnpm relay:build

      - name: Build extension
        run: pnpm wxt:build

      - name: Verify production bundle has no dev HMR endpoints
        run: |
          if grep -rn "localhost:3000\|vite-hmr\|ws://localhost" .output/chrome-mv3 \
             | grep -v 'includes("ws://localhost' \
             | grep -v 'includes("ws://local'; then
            echo "Found dev-only HMR references in production bundle."
            exit 1
          fi

  e2e-tests:
    runs-on: ubuntu-latest
    needs: quality-gates
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.25.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Build E2E extension
        run: pnpm wxt:build:e2e

      - name: Run E2E tests
        run: xvfb-run pnpm playwright test -c e2e/playwright.config.ts

      - name: Upload test artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-results
          path: |
            e2e/test-results/
            e2e/playwright-report/
          retention-days: 7
