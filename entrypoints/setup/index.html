<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OpenMyHealth Setup</title>
    <style>
      body {
        margin: 0;
        min-height: 100dvh;
        font-family: "Pretendard Variable", "Pretendard", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background:
          radial-gradient(circle at 0% 0%, rgba(206, 239, 227, 0.56) 0%, transparent 55%),
          #f9f8f5;
        color: #1f2933;
      }
      .shell {
        max-width: 780px;
        margin: clamp(12px, 4vw, 32px) auto;
        border: 1px solid #dfddd6;
        border-radius: 18px;
        background: #fff;
        padding: clamp(16px, 3vw, 24px);
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06), 0 1px 2px rgba(0, 0, 0, 0.04);
      }
      .title {
        margin: 0;
        font-size: 20px;
        font-weight: 650;
      }
      .copy {
        margin-top: 10px;
        font-size: 14px;
        color: #55606d;
      }
      .pulse {
        margin-top: 18px;
        width: 180px;
        height: 10px;
        border-radius: 999px;
        overflow: hidden;
        background: #e8ece9;
        position: relative;
      }
      .retry-btn {
        margin-top: 16px;
        min-height: 44px;
        border: 1px solid #d6d8d4;
        border-radius: 10px;
        background: #fff;
        color: #1f2933;
        font-size: 14px;
        font-weight: 600;
        padding: 10px 16px;
        cursor: pointer;
      }
      .retry-btn:hover {
        background: #f4f6f5;
      }
      .pulse::before {
        content: "";
        position: absolute;
        inset: 0;
        width: 35%;
        background: #0f6b55;
        animation: shimmer 1.3s ease-in-out infinite;
      }
      @keyframes shimmer {
        0% { transform: translateX(-120%); }
        100% { transform: translateX(320%); }
      }
      @media (prefers-reduced-motion: reduce) {
        .pulse::before {
          animation: none;
        }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <main id="setup-bootstrap-shell" class="shell">
        <h1 class="title">초기 설정을 준비하는 중입니다...</h1>
        <p class="copy">잠시만 기다려 주세요. 설정 화면이 자동으로 열립니다.</p>
        <div class="pulse" aria-hidden="true"></div>
      </main>
    </div>
    <script src="/setup-loader-guard.js"></script>
    <script type="module" src="./bootstrap.ts"></script>
  </body>
</html>
